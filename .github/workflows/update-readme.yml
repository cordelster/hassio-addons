name: Update README

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'addons/**/config.yaml'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate addon list
        run: python3 .github/scripts/update-readme.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "chore: update addon list in README")
          git push
